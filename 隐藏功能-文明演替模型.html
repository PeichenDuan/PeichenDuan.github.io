                        else if (tribe.territoryCells.size < 6) addEvent('divine', '领土太小无法分裂。');
                        else { tribe.unrest = 85;
                            triggerSplit(tribe);
                            addEvent('divine', `强制分裂<b>${tribe.name}</b>。`); }
                        break;
                    case 'cleanse':
                        let cl = 0;
                        for (let dy = -5; dy <= 5; dy++)
                            for (let dx = -5; dx <= 5; dx++) { const nx = x + dx,
                                    ny = y + dy; if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE && terrain[ny][
                                        nx
                                    ] === RADIOACTIVE) { terrain[ny][nx] = PLAINS;
                                    cl++; } } if (cl > 0) { terrainDirty = true;
                                updateRadCount();
                                addEvent('divine', `净化${cl}格辐射。`); } else addEvent('divine', '周围无辐射。');
                        break;
                    case 'asteroid':
                        triggerMassExtinction(0.75 + Math.random() * 0.2);
                        addEvent('divine', '☄️ 上帝降下灭世星陨！');
                        break;
                    case 'raiseMountain':
                        let ra = 0;
                        for (let dy = -2; dy <= 2; dy++)
                            for (let dx = -2; dx <= 2; dx++) { const nx = x + dx,
                                    ny = y + dy; if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE && terrain[ny][
                                        nx
                                    ] !== OCEAN && terrain[ny][nx] !== MOUNTAIN) { terrain[ny][nx] = MOUNTAIN;
                                    ra++; } } if (ra > 0) { terrainDirty = true;
                                addEvent('divine', `造山${ra}格。`); } else addEvent('divine', '无法造山。');
                        break;
                    case 'removeMountain':
                        let rm = 0;
                        for (let dy = -2; dy <= 2; dy++)
                            for (let dx = -2; dx <= 2; dx++) { const nx = x + dx,
                                    ny = y + dy; if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE && terrain[ny][
                                        nx
                                    ] === MOUNTAIN) { terrain[ny][nx] = PLAINS;
                                    rm++; } } if (rm > 0) { terrainDirty = true;
                                addEvent('divine', `移山${rm}格。`); } else addEvent('divine', '周围无山。');
                        break;
                    case 'landReclaim':
                        let rec = 0;
                        for (let dy = -2; dy <= 2; dy++)
                            for (let dx = -2; dx <= 2; dx++) { const nx = x + dx,
                                    ny = y + dy; if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE && terrain[ny][
                                        nx
                                    ] === OCEAN) { terrain[ny][nx] = PLAINS;
                                    rec++; } } if (rec > 0) { terrainDirty = true;
                                addEvent('divine', `填海${rec}格。`); } else addEvent('divine', '周围无海。');
                        break;
                    case 'sinkLand':
                        let sunk = 0;
                        for (let dy = -2; dy <= 2; dy++)
                            for (let dx = -2; dx <= 2; dx++) { const nx = x + dx,
                                    ny = y + dy; if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE && terrain[ny][
                                        nx
                                    ] !== OCEAN) { if (owner[ny][nx] !== null) { const oid = owner[ny][nx]; if (tribes[oid])
                                            tribes[oid].territoryCells.delete(ny * GRID_SIZE + nx);
                                        owner[ny][nx] = null; }
                                    terrain[ny][nx] = OCEAN;
                                    sunk++; } } if (sunk > 0) { terrainDirty = true;
                                updateRadCount();
                                addEvent('divine', `沉没${sunk}格。`); } else addEvent('divine', '已是海洋。');
                        break;
                    case 'plague':
                        if (!tribe) addEvent('divine', '⚠️ 请点击文明所在地。');
                        else { startPlague(x, y, 4);
                            addEvent('divine', `在(${x},${y})引发<b>瘟疫</b>。`); }
                        break;
                    case 'prosperity':
                        if (!tribe) addEvent('divine', '⚠️ 请点击文明。');
                        else { const add = Math.floor(tribe.population * 0.5);
                            tribe.population += add;
                            tribe.unrest = Math.max(0, tribe.unrest - 60);
                            tribe.diseaseLevel = Math.max(0, tribe.diseaseLevel - 80);
                            tribe._K = calcCarryingCapacity(tribe) * 1.8;
                            updateTribeStage(tribe);
                            addEvent('divine', `🌟 赐予<b>${tribe.name}</b>繁荣！人口+${add}。`); }
                        break;
                }
                renderMap();
            }

            function triggerDivineNuke(x, y) {
                totalNukes++;
                const aff = new Set(),
                    affT = new Set();
                for (let dy = -8; dy <= 8; dy++)
                    for (let dx = -8; dx <= 8; dx++)
                        if (Math.sqrt(dx * dx + dy * dy) <= 8) { const nx = x + dx,
                                ny = y + dy; if (nx >= 0 && nx < GRID_SIZE && ny >= 0 && ny < GRID_SIZE && terrain[ny][
                                    nx
                                ] !== OCEAN) { aff.add(ny * GRID_SIZE + nx); if (terrain[ny][nx] !== RADIOACTIVE && Math
                                    .random() < 0.75) terrain[ny][nx] = RADIOACTIVE; const o = owner[ny][nx]; if (o !==
                                    null && tribes[o] && tribes[o].alive) affT.add(o); } }
                nukeEffects.push({ cells: aff, endTime: gameHour + 40, type: '上帝核击' });
                terrainDirty = true;
                updateRadCount();
                let rep = '';
                for (const tid of affT) { const t = tribes[tid]; const loss = Math.floor(t.population * (0.35 + Math.random() *
                        0.45));
                    t.population = Math.max(1, t.population - loss);
                    t.unrest = Math.min(100, t.unrest + 20);
                    rep += `${t.name}损失${loss}人，`;
                    checkTribeAlive(t); }
                addEvent('nuke',
                    `💥☢️ <b>上帝核打击！</b>在(${x},${y})引爆核弹，${affT.size}文明受创。${rep.slice(0,-1)}，${aff.size}格污染。`);
            }

            function globalPeace() {
                let ended = 0;
                for (const t of tribes) { if (!t.alive) continue; for (const w of t.atWarWith) { const o = tribes[w]; if (o && o
                        .alive) { o.atWarWith.delete(t.id);
                            ended++; } }
                    t.atWarWith.clear(); }
                activeWars = [];
                warEffects = [];
                addEvent('divine', ended > 0 ? `🕊️ 强制和平：终止${ended}场冲突。` : '🕊️ 无活跃冲突。');
            }

            function showCellInfo(x, y, ter, tribe) {
                let tn = '海洋';
                if (ter === PLAINS) tn = '平原';
                else if (ter === MOUNTAIN) tn = '山地';
                else if (ter === RADIOACTIVE) tn = '辐射污染';
                if (tribe) { const s = STAGES[tribe.stageIndex],
                        K = tribe._K || calcCarryingCapacity(tribe);
                    addEvent('report',
                        `📍 (${x},${y}) ${tn} | <span style="color:${tribe.color}"><b>${tribe.name}</b></span> | 人口${tribe.population}/K${Math.round(K)} | ${s.name} | 不满${tribe.unrest.toFixed(0)}% | 领土${tribe.territoryCells.size}格`
                        );
                } else addEvent('report', `📍 (${x},${y}) ${tn} | 无主之地`);
                updateLogDisplay();
            }

            function gameTick() {
                if (!running) return;
                gameHour++;
                checkAsteroidImpact();
                const alive = tribes.filter(t => t.alive);
                for (const tribe of alive) {
                    tribeGrowthSigmoid(tribe);
                    updateTribeStage(tribe);
                    updateUnrest(tribe);
                    const stage = STAGES[tribe.stageIndex];
                    if (Math.random() < stage.expandRate * 0.7) {
                        const expandCount = Math.max(1, Math.floor(tribe.population / 160) * (1 + stage.techLevel * 0.25));
                        expandTribeTerritory(tribe, Math.min(Math.round(expandCount), 40));
                    }
                    if (tribe.population < 50) checkTribeAlive(tribe);
                }
                for (const war of activeWars) { if (!war.resolved && gameHour >= war.startGameHour + war.duration) { war
                        .resolved = true;
                        resolveWar(war); } }
                activeWars = activeWars.filter(w => !w.resolved);
                checkWar();
                checkAlliance();
                checkDisaster();
                checkNewTribe();
                recoverRadiation();
                updatePlagues();
                applyMissionaryEffects();
                checkColonyIndependence();
                checkNuclearStrikes();
                cleanSmallExclaves();
                checkEnclaveAssimilation();
                checkExclaveIndependence();
                for (let y = 0; y < GRID_SIZE; y++)
                    for (let x = 0; x < GRID_SIZE; x++) { const o = owner[y][x]; if (o !== null && (!tribes[o] || !tribes[o]
                            .alive)) { owner[y][x] = null;
                            terrainDirty = true; } }
                if (gameHour - lastReportGameHour >= 120) { lastReportGameHour = gameHour;
                    generateDecadalReport(); }
                renderMap();
                updateInfoBar();
                updateLogDisplay();
            }

            function mainLoop(timestamp) {
                if (running) {
                    if (lastUpdateTime === 0) lastUpdateTime = timestamp;
                    const delta = timestamp - lastUpdateTime;
                    lastUpdateTime = timestamp;
                    accumulatedTime += delta;
                    const tickInterval = 1000 / speedMultiplier;
                    let ticked = false;
                    while (accumulatedTime >= tickInterval) { accumulatedTime -= tickInterval;
                        gameTick();
                        ticked = true; }
                    if (!ticked && (warEffects.length > 0 || disasterEffects.length > 0 || nukeEffects.length > 0 ||
                            plagueEffects.length > 0)) renderMap();
                }
                updateInfoBar();
                animationFrameId = requestAnimationFrame(mainLoop);
            }

            function toggleSimulation() {
                running = !running;
                btnStart.textContent = running ? '⏸ 暂停' : '▶ 开始演化';
                btnStart.classList.toggle('running', running);
                lastUpdateTime = 0;
                accumulatedTime = 0;
                addEvent('report', running ? '▶️ 演化开始——文明的火种已被点燃。' : '⏸️ 演化已暂停。');
                updateLogDisplay();
            }

            function setSpeed(speed, btnEl) {
                speedMultiplier = speed;
                accumulatedTime = 0;
                lastUpdateTime = 0;
                document.querySelectorAll('.btn-speed').forEach(b => b.classList.remove('active'));
                if (btnEl) btnEl.classList.add('active');
                addEvent('report', `⏱ 速度调整为 <b>${speed}×</b>`);
                updateLogDisplay();
            }

            function resetGame() {
                running = false;
                btnStart.textContent = '▶ 开始演化';
                btnStart.classList.remove('running');
                gameHour = 0;
                totalWars = 0;
                totalDisasters = 0;
                totalNukes = 0;
                totalSplits = 0;
                warEffects = [];
                disasterEffects = [];
                nukeEffects = [];
                plagueEffects = [];
                activeWars = [];
                eventQueue = [];
                tribes = [];
                accumulatedTime = 0;
                lastUpdateTime = 0;
                lastReportGameHour = 0;
                availableNames = [...TRIBE_NAMES_POOL];
                terrainDirty = true;
                initTerrain();
                initTribes();
                for (const t of tribes) { updateTribeStage(t);
                    t._K = calcCarryingCapacity(t); }
                renderTerrainToOffscreen();
                renderMap();
                updateInfoBar();
                eventQueue = [];
                addEvent('report', '🔄 世界已重置。点击"开始演化"或使用上帝工具进行干预。');
                updateLogDisplay();
            }

            function initTribes() {
                tribes = [];
                const land = [];
                for (let y = 0; y < GRID_SIZE; y++)
                    for (let x = 0; x < GRID_SIZE; x++)
                        if (terrain[y][x] !== OCEAN) land.push({ x, y });
                if (land.length === 0) return;
                const num = 2 + Math.floor(Math.random() * 4);
                const used = new Set();
                for (let i = 0; i < num; i++) {
                    let best = null,
                        bd = -1;
                    for (let a = 0; a < 250; a++) { const cand = land[Math.floor(Math.random() * land.length)]; const key = cand
                            .y * GRID_SIZE + cand.x; if (used.has(key)) continue; let min = Infinity; for (const uk of used) { const
                                d = Math.abs(cand.x - (uk % GRID_SIZE)) + Math.abs(cand.y - Math.floor(uk / GRID_SIZE)); if (d <
                                    min) min = d; } if (used.size === 0 || min > bd) { bd = min;
                            best = cand; } if (bd > 35) break; }
                    if (!best) break;
                    used.add(best.y * GRID_SIZE + best.x);
                    const name = availableNames.shift();
                    if (!name) break;
                    if (availableNames.length === 0) availableNames.push('遗民', '拓荒者', '余烬', '新芽');
                    const tribe = { id: i, name, color: TRIBE_COLORS[i % TRIBE_COLORS.length], population: Math.max(50, 40 + Math
                            .floor(Math.random() * 80)), territoryCells: new Set([best.y * GRID_SIZE + best.x]),
                        allies: new Set(), atWarWith: new Set(), stageIndex: 0, alive: true, foundingGameHour: gameHour,
                        unrest: 5 + Math.random() * 10, diseaseLevel: 0, colonies: [] };
                    owner[best.y][best.x] = i;
                    tribes.push(tribe);
                    expandTribeTerritory(tribe, 5 + Math.floor(Math.random() * 10));
                }
                terrainDirty = true;
            }

            canvas.addEventListener('click', handleCanvasClick);
            canvas.addEventListener('mousemove', (e) => {
                const { x, y } = getGridFromEvent(e);
                if (x !== mouseGridX || y !== mouseGridY) { mouseGridX = x;
                    mouseGridY = y;
                    renderMap(); if (x >= 0 && x < GRID_SIZE && y >= 0 && y < GRID_SIZE) { const t = terrain[y][x],
                            o = owner[y][x]; let info = `(${x},${y}) `; if (t === OCEAN) info += '海洋'; else if (t ===
                            RADIOACTIVE) info += '辐射污染'; else if (t === MOUNTAIN) info += '山地'; else info += '平原'; if (
                            o !== null && tribes[o] && tribes[o].alive) info +=
                            ` | ${tribes[o].name} [${STAGES[tribes[o].stageIndex].name}] ${tribes[o].population}人`; else if (
                            t !== OCEAN) info += ' | 无主';
                        canvasTooltip.textContent = info;
                        canvasTooltip.style.display = 'block'; const rect = canvas.getBoundingClientRect();
                        canvasTooltip.style.left = (e.clientX - rect.left + 16) + 'px';
                        canvasTooltip.style.top = (e.clientY - rect.top - 30) + 'px'; } else canvasTooltip.style.display =
                        'none'; }
            });
            canvas.addEventListener('mouseleave', () => { mouseGridX = -1;
                mouseGridY = -1;
                canvasTooltip.style.display = 'none';
                renderMap(); });

            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') { e.preventDefault();
                    toggleSimulation(); } else if (e.code === 'Digit1') setSpeed(1, document.querySelector(
                    '[data-speed="1"]'));
                else if (e.code === 'Digit2') setSpeed(2, document.querySelector('[data-speed="2"]'));
                else if (e.code === 'Digit4') setSpeed(4, document.querySelector('[data-speed="4"]'));
                else if (e.code === 'Digit8') setSpeed(8, document.querySelector('[data-speed="8"]'));
                else if (e.code === 'KeyR' && !e.ctrlKey && !e.metaKey) resetGame();
                else if (e.code === 'KeyI') setTool('info', document.querySelector('[data-tool="info"]'));
                else if (e.code === 'KeyS') setTool('spawn', document.querySelector('[data-tool="spawn"]'));
                else if (e.code === 'KeyU') setTool('upgrade', document.querySelector('[data-tool="upgrade"]'));
                else if (e.code === 'KeyN') setTool('nuke', document.querySelector('[data-tool="nuke"]'));
                else if (e.code === 'KeyD') setTool('disaster', document.querySelector('[data-tool="disaster"]'));
                else if (e.code === 'KeyB') setTool('bless', document.querySelector('[data-tool="bless"]'));
                else if (e.code === 'KeyC') setTool('curse', document.querySelector('[data-tool="curse"]'));
                else if (e.code === 'KeyP') setTool('split', document.querySelector('[data-tool="split"]'));
                else if (e.code === 'KeyL') setTool('cleanse', document.querySelector('[data-tool="cleanse"]'));
                else if (e.code === 'KeyG') globalPeace();
                else if (e.code === 'KeyA') setTool('asteroid', document.querySelector('[data-tool="asteroid"]'));
                else if (e.code === 'KeyM') setTool('raiseMountain', document.querySelector('[data-tool="raiseMountain"]'));
                else if (e.code === 'KeyV') setTool('removeMountain', document.querySelector('[data-tool="removeMountain"]'));
                else if (e.code === 'KeyF') setTool('landReclaim', document.querySelector('[data-tool="landReclaim"]'));
                else if (e.code === 'KeyK') setTool('sinkLand', document.querySelector('[data-tool="sinkLand"]'));
                else if (e.code === 'KeyE') setTool('plague', document.querySelector('[data-tool="plague"]'));
                else if (e.code === 'KeyT') setTool('prosperity', document.querySelector('[data-tool="prosperity"]'));
            });

            function init() {
                initTerrain();
                initTribes();
                for (const t of tribes) { updateTribeStage(t);
                    t._K = calcCarryingCapacity(t); }
                renderTerrainToOffscreen();
                renderMap();
                updateInfoBar();
                eventQueue = [];
                addEvent('report', `🌍 世界已生成：${tribes.length}个原始文明。点击"开始演化"或使用上帝工具干预。`);
                updateLogDisplay();
                lastReportGameHour = gameHour;
                animationFrameId = requestAnimationFrame(mainLoop);
            }

            window.toggleSimulation = toggleSimulation;
            window.setSpeed = setSpeed;
            window.resetGame = resetGame;
            window.setTool = setTool;
            window.globalPeace = globalPeace;
            window.downloadLog = downloadLog;
            init();
        })();
    </script>
</body>
</html>
