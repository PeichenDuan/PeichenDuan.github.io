<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文明演替模型</title>
    <style>
        :root {
            --bg: #f5f2eb;
            --panel-bg: #fefefc;
            --text: #2c2416;
            --text-secondary: #5c5344;
            --text-muted: #8a8070;
            --border: #d5d0c6;
            --border-light: #e6e2d9;
            --accent: #3a5068;
            --accent-light: #5a7894;
            --war: #8b3a3a;
            --ally: #4a6b4a;
            --disaster: #9b6b2a;
            --birth: #2a5a7b;
            --report: #5c4a3a;
            --split: #7b4a2a;
            --nuke: #6b1a1a;
            --radioactive: #8a7a65;
            --button-bg: #f8f6f0;
            --button-hover: #ebe6da;
            --button-active: #3a5068;
            --log-bg: #faf9f5;
            --tool-active: #e8dcc8;
            --shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 4px 24px rgba(0, 0, 0, 0.10);
            --radius: 6px;
            --radius-sm: 3px;
            --font-serif: 'Georgia', 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', 'STSong', serif;
            --font-sans: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            --font-mono: 'SF Mono', 'Consolas', 'Courier New', 'PingFang SC', monospace;
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: var(--font-sans);
            min-height: 100vh;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 顶部标题栏 */
        .tool-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            width: 100%;
            text-align: center;
        }
        .tool-header h2 {
            color: white;
            font-family: var(--font-serif);
            font-size: 1.5em;
            letter-spacing: 0.04em;
            font-weight: 600;
        }
        .back-button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            margin-top: 15px;
            text-decoration: none;
            font-family: var(--font-sans);
        }
        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* 内容区域 */
        .content {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .container {
            background: var(--panel-bg);
            border-radius: 10px;
            padding: 20px 22px;
            max-width: 1100px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .container .header {
            text-align: center;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-light);
        }
        .container .header h1 {
            font-family: var(--font-serif);
            font-size: 1.5em;
            letter-spacing: 0.04em;
            color: #2c2416;
            font-weight: 600;
        }
        .main-content {
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }
        .left-panel {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }
        .right-panel {
            flex: 0 0 270px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .canvas-wrapper {
            position: relative;
            background: #faf9f6;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            line-height: 0;
            cursor: crosshair;
            box-shadow: var(--shadow);
        }
        .canvas-wrapper.info-mode {
            cursor: default;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            image-rendering: auto;
        }
        .canvas-tooltip {
            position: absolute;
            pointer-events: none;
            background: rgba(44, 36, 22, 0.88);
            color: #f0ece4;
            font-size: 0.65em;
            padding: 4px 8px;
            border-radius: 3px;
            font-family: var(--font-mono);
            white-space: nowrap;
            display: none;
            z-index: 10;
            letter-spacing: 0.03em;
        }
        .info-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 14px;
            font-size: 0.72em;
            color: var(--text-secondary);
            background: #faf9f5;
            border-radius: var(--radius-sm);
            padding: 7px 12px;
            border: 1px solid var(--border-light);
            font-family: var(--font-serif);
            letter-spacing: 0.02em;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 3px;
            white-space: nowrap;
        }
        .info-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
            flex-shrink: 0;
            border: 1px solid rgba(0, 0, 0, 0.15);
        }
        .info-value {
            font-weight: 600;
            color: #2c2416;
            min-width: 22px;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.95em;
        }
        .info-label {
            color: var(--text-muted);
            font-size: 0.85em;
        }
        .btn {
            padding: 7px 16px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.75em;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: all 0.2s;
            font-family: var(--font-sans);
            background: var(--button-bg);
            color: var(--text);
            white-space: nowrap;
            width: 100%;
            margin-bottom: 4px;
        }
        .btn:hover {
            background: var(--button-hover);
            border-color: #c0b8a8;
        }
        .btn.btn-start {
            background: #3a5068;
            color: #f8f6f0;
            border-color: #2a4058;
            font-weight: 600;
            letter-spacing: 0.05em;
        }
        .btn.btn-start:hover {
            background: #4a6480;
            border-color: #3a5068;
        }
        .btn.btn-start.running {
            background: #8b3a3a;
            border-color: #6b2a2a;
            color: #f8f4f0;
        }
        .btn.btn-start.running:hover {
            background: #a04a4a;
        }
        .btn-speed {
            padding: 5px 8px;
            font-size: 0.7em;
            border-radius: 3px;
            min-width: 36px;
            text-align: center;
            width: auto;
            margin-bottom: 0;
        }
        .btn-speed.active {
            background: #e8dcc8;
            border-color: #b8a888;
            font-weight: 600;
            color: #3a2a10;
        }
        .btn-reset {
            color: #6b5a4a;
            font-size: 0.7em;
            padding: 5px 11px;
        }
        .btn-reset:hover {
            background: #f5e8e0;
            border-color: #c0a090;
            color: #8b3a3a;
        }
        .toolbar {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            padding: 6px 8px;
            background: #faf9f5;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-light);
            font-size: 0.7em;
        }
        .toolbar-label {
            font-size: 0.75em;
            color: var(--text-muted);
            font-family: var(--font-serif);
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            margin-right: 2px;
            font-style: italic;
            width: 100%;
            margin-bottom: 4px;
        }
        .btn-tool {
            padding: 4px 8px;
            font-size: 0.68em;
            border-radius: 3px;
            border: 1px solid var(--border-light);
            background: #fefefc;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-sans);
            letter-spacing: 0.02em;
            white-space: nowrap;
            width: auto;
            margin-bottom: 0;
        }
        .btn-tool:hover {
            background: #f0ece2;
            border-color: #c0b8a8;
        }
        .btn-tool.active {
            background: var(--tool-active);
            border-color: #b8a070;
            font-weight: 600;
            color: #3a2a10;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.06);
        }
        .btn-tool.dangerous {
            color: #8b3a3a;
            border-color: #e0c8c0;
        }
        .btn-tool.dangerous.active {
            background: #f5e0d8;
            border-color: #c09080;
            color: #5a1a1a;
        }
        .btn-global {
            padding: 5px 8px;
            font-size: 0.6em;
            border-radius: 3px;
            border: 1px dashed var(--border);
            background: #fefefc;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-sans);
            width: auto;
        }
        .btn-global:hover {
            background: #f8f2e8;
            border-color: #b8a080;
            border-style: solid;
        }
        .log-panel {
            background: var(--log-bg);
            border-radius: var(--radius-sm);
            padding: 9px 11px;
            max-height: 165px;
            overflow-y: auto;
            font-size: 0.66em;
            line-height: 1.55;
            border: 1px solid var(--border-light);
            font-family: var(--font-mono);
            letter-spacing: 0.02em;
        }
        .log-panel::-webkit-scrollbar {
            width: 4px;
        }
        .log-panel::-webkit-scrollbar-track {
            background: transparent;
        }
        .log-panel::-webkit-scrollbar-thumb {
            background: #d5d0c6;
            border-radius: 2px;
        }
        .log-entry {
            padding: 1px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.02);
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-3px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .log-war {
            color: #8b3a3a;
        }
        .log-ally {
            color: #4a6b4a;
        }
        .log-disaster {
            color: #9b6b2a;
        }
        .log-birth {
            color: #2a5a7b;
        }
        .log-report {
            color: #5c4a3a;
            font-weight: 600;
        }
        .log-split {
            color: #7b4a2a;
        }
        .log-nuke {
            color: #6b1a1a;
            font-weight: 700;
        }
        .log-divine {
            color: #3a5068;
            font-style: italic;
            font-weight: 600;
        }
        .log-asteroid {
            color: #b03010;
            font-weight: 700;
            background: rgba(255, 200, 150, 0.15);
        }
        .log-plague {
            color: #444;
        }
        .log-time {
            color: #a09888;
            margin-right: 4px;
            font-size: 0.9em;
            font-family: var(--font-serif);
        }

        /* 底部状态栏 */
        .status-bar {
            padding: 10px;
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            font-family: var(--font-sans);
        }

        @media (max-width: 750px) {
            .main-content {
                flex-direction: column;
            }
            .right-panel {
                flex: 0 0 auto;
                width: 100%;
            }
            .btn {
                width: auto;
            }
            .btn-speed {
                width: auto;
            }
            .content {
                padding: 10px;
            }
            .container {
                padding: 12px 10px;
            }
        }
    </style>
</head>
<body>
    <div class="tool-header">
        <h2>文明演替模型</h2>
        <a href="index.html" class="back-button">返回主界面</a>
    </div>

    <div class="content">
        <div class="container">
            <div class="header"><h1>文明演替模型</h1></div>
            <div class="main-content">
                <div class="left-panel">
                    <div class="canvas-wrapper" id="canvasWrapper">
                        <canvas id="mapCanvas" width="1200" height="1200"></canvas>
                        <div class="canvas-tooltip" id="canvasTooltip"></div>
                    </div>
                    <div class="info-bar" id="infoBar">
                        <span class="info-item">🏛️ 文明体：<span class="info-value" id="tribeCount">0</span></span>
                        <span class="info-item">👥 总人口：<span class="info-value" id="totalPop">0</span></span>
                        <span class="info-item">📅 时间：<span class="info-value" id="gameTime" style="min-width:90px;">公元0年1月</span></span>
                        <span class="info-item">⚔️ 冲突：<span class="info-value" id="warCount">0</span></span>
                        <span class="info-item">🌪️ 灾害：<span class="info-value" id="disasterCount">0</span></span>
                        <span class="info-item">💥 核爆：<span class="info-value" id="nukeCount">0</span></span>
                        <span class="info-item">☢️ 污染格：<span class="info-value" id="radCount">0</span></span>
                    </div>
                </div>
                <div class="right-panel">
                    <button class="btn btn-start" id="btnStart" onclick="toggleSimulation()">▶ 开始演化</button>
                    <div style="display:flex; gap:4px; flex-wrap:wrap;">
                        <button class="btn btn-speed active" data-speed="1" onclick="setSpeed(1, this)">1×</button>
                        <button class="btn btn-speed" data-speed="2" onclick="setSpeed(2, this)">2×</button>
                        <button class="btn btn-speed" data-speed="4" onclick="setSpeed(4, this)">4×</button>
                        <button class="btn btn-speed" data-speed="8" onclick="setSpeed(8, this)">8×</button>
                    </div>
                    <button class="btn btn-reset" onclick="resetGame()">🔄 重置世界</button>
                    <button class="btn btn-global" onclick="downloadLog()">📄 下载日志</button>
                    <div class="toolbar" id="toolbar">
                        <span class="toolbar-label">上帝干预：</span>
                        <button class="btn-tool active" data-tool="info" onclick="setTool('info', this)">🔍 观察</button>
                        <button class="btn-tool" data-tool="spawn" onclick="setTool('spawn', this)">🏛️ 投放</button>
                        <button class="btn-tool" data-tool="upgrade" onclick="setTool('upgrade', this)">⬆️ 升级</button>
                        <button class="btn-tool dangerous" data-tool="nuke" onclick="setTool('nuke', this)">💥 核击</button>
                        <button class="btn-tool dangerous" data-tool="disaster" onclick="setTool('disaster', this)">🌪️ 天灾</button>
                        <button class="btn-tool" data-tool="bless" onclick="setTool('bless', this)">✨ 赐福</button>
                        <button class="btn-tool dangerous" data-tool="curse" onclick="setTool('curse', this)">💀 诅咒</button>
                        <button class="btn-tool dangerous" data-tool="split" onclick="setTool('split', this)">💔 分裂</button>
                        <button class="btn-tool" data-tool="cleanse" onclick="setTool('cleanse', this)">🧹 净化</button>
                        <button class="btn-global" onclick="globalPeace()">🕊️ 强制和平</button>
                    </div>
                    <div class="toolbar" id="toolbar2">
                        <span class="toolbar-label">自然之力：</span>
                        <button class="btn-tool dangerous" data-tool="asteroid" onclick="setTool('asteroid', this)">☄️ 星陨</button>
                        <button class="btn-tool" data-tool="raiseMountain" onclick="setTool('raiseMountain', this)">⛰️ 造山</button>
                        <button class="btn-tool" data-tool="removeMountain" onclick="setTool('removeMountain', this)">🏔️➡️🌄 移山</button>
                        <button class="btn-tool" data-tool="landReclaim" onclick="setTool('landReclaim', this)">🌊➡️🏞️ 填海</button>
                        <button class="btn-tool dangerous" data-tool="sinkLand" onclick="setTool('sinkLand', this)">🏞️➡️🌊 沉没</button>
                        <button class="btn-tool dangerous" data-tool="plague" onclick="setTool('plague', this)">🦠 瘟疫</button>
                        <button class="btn-tool" data-tool="prosperity" onclick="setTool('prosperity', this)">🌟 繁荣</button>
                    </div>
                    <div class="log-panel" id="logPanel">
                        <div class="log-entry log-report">🕐 世界初始化完成。点击"开始演化"或使用上帝工具干预文明进程。</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        江南大学 粮食发酵工艺与技术国家工程实验室
    </div>

    <script>
