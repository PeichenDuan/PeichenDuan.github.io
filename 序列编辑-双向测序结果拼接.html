<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双向测序结果拼接 - 生物信息分析工具包</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --light-color: #ecf0f1;
            --dark-color: #2c3e50;
            --success-color: #27ae60;
            --warning-color: #f39c12;
            --border-radius: 8px;
            --box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .tool-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            width: 100%;
            text-align: center;
        }

        .back-button {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
            margin-top: 15px;
            text-decoration: none;
            display: inline-block;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .content {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section {
            background: white;
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: var(--box-shadow);
        }

        h2 {
            color: var(--primary-color);
            text-align: center;
        }

        h3 {
            color: var(--secondary-color);
            margin-bottom: 15px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            font-size: 14px;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .button {
            padding: 10px 15px;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: var(--transition);
            font-weight: bold;
        }

        .primary-button {
            background-color: var(--secondary-color);
            color: white;
        }

        .primary-button:hover {
            background-color: #2980b9;
        }

        .success-button {
            background-color: var(--success-color);
            color: white;
        }

        .success-button:hover {
            background-color: #219653;
        }

        .warning-button {
            background-color: var(--warning-color);
            color: white;
        }

        .warning-button:hover {
            background-color: #e67e22;
        }

        .gene-entry {
            border: 1px solid #ddd;
            border-radius: var(--border-radius);
            padding: 15px;
            margin-bottom: 20px;
            background-color: #f9f9f9;
        }

        .gene-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .gene-title {
            font-weight: bold;
            color: var(--primary-color);
        }

        .remove-gene {
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            padding: 5px 10px;
            cursor: pointer;
        }

        .result-box {
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: var(--border-radius);
            margin-top: 15px;
            border-left: 4px solid var(--secondary-color);
        }

        .sequence-display {
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
            background-color: #fff;
            padding: 10px;
            border-radius: var(--border-radius);
            border: 1px solid #ddd;
            margin-top: 10px;
        }

        .highlight {
            background-color: #fffacd;
            padding: 2px 0;
        }

        .status-bar {
            padding: 10px;
            background-color: var(--primary-color);
            color: white;
            text-align: center;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
        }

        .file-upload-area {
            border: 2px dashed #3498db;
            padding: 20px;
            border-radius: var(--border-radius);
            background: #f0f8ff;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .drop-zone {
            flex: 1;
            min-width: 250px;
            border: 2px dashed #3498db;
            border-radius: var(--border-radius);
            padding: 25px 15px;
            text-align: center;
            background: #ffffff;
            transition: background 0.3s, border-color 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .drop-zone.drag-over {
            background: #e1f0ff;
            border-color: #1d6fa5;
        }

        .drop-zone .drop-icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #3498db;
        }

        .drop-zone .drop-text {
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .drop-zone .file-name {
            font-size: 0.9rem;
            color: #27ae60;
            margin-top: 8px;
            word-break: break-all;
        }

        .drop-zone input[type="file"] {
            display: none;
        }

        /* 为导入区域与基因容器之间增加明显间距 */
        #genes-container {
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            .button-group {
                flex-direction: column;
            }
            .button {
                width: 100%;
            }
            .file-upload-area {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="tool-header">
        <h2 style="color: white;">双向测序结果拼接</h2>
        <a href="index.html" class="back-button">返回主界面</a>
    </div>

    <div class="content">
        <div class="section">
            <h2>双向测序结果拼接</h2>
            <p>上传正向链和反向互补链测序FASTA文件批量导入，或手动输入序列。支持拖放文件到对应区域。系统将自动拼接并生成完整序列。</p>

            <!-- 批量文件上传区域：两个可拖放区域 -->
            <div class="file-upload-area">
                <!-- 正向链拖放区 -->
                <div class="drop-zone" id="forward-drop-zone">
                    <div class="drop-icon">🧬</div>
                    <div class="drop-text">拖放正向链FASTA文件到此处</div>
                    <div style="font-size:0.85rem; color:#666;">或点击选择文件</div>
                    <div class="file-name" id="forward-file-name"></div>
                    <input type="file" id="forward-fasta-file" accept=".fasta,.fa,.txt">
                </div>
                <!-- 反向链拖放区 -->
                <div class="drop-zone" id="reverse-drop-zone">
                    <div class="drop-icon">🔬</div>
                    <div class="drop-text">拖放反向链FASTA文件到此处</div>
                    <div style="font-size:0.85rem; color:#666;">或点击选择文件</div>
                    <div class="file-name" id="reverse-file-name"></div>
                    <input type="file" id="reverse-fasta-file" accept=".fasta,.fa,.txt">
                </div>
            </div>

            <div class="button-group">
                <button id="import-fasta" class="button success-button">📥 导入并配对</button>
                <button id="clear-import" class="button" style="background: #95a5a6; color: white;">🗑️ 清空文件选择</button>
            </div>

            <div id="genes-container">
                <!-- 基因条目将动态添加到这里，初始无内容 -->
            </div>

            <div class="button-group">
                <button id="add-gene" class="button primary-button">➕ 添加基因</button>
                <button id="process-all" class="button success-button">⚙️ 处理所有基因</button>
                <button id="export-all" class="button warning-button">💾 导出所有基因(FASTA)</button>
            </div>

            <div id="process-result" class="result-box" style="display: none;">
                <!-- 处理结果将在这里显示 -->
            </div>
        </div>
    </div>

    <div class="status-bar">
        江南大学 粮食发酵工艺与技术国家工程实验室
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const genesContainer = document.getElementById('genes-container');
            const addGeneButton = document.getElementById('add-gene');
            const processAllButton = document.getElementById('process-all');
            const exportAllButton = document.getElementById('export-all');
            const processResult = document.getElementById('process-result');
            const importFastaBtn = document.getElementById('import-fasta');
            const clearImportBtn = document.getElementById('clear-import');
            const forwardFileInput = document.getElementById('forward-fasta-file');
            const reverseFileInput = document.getElementById('reverse-fasta-file');
            const forwardDropZone = document.getElementById('forward-drop-zone');
            const reverseDropZone = document.getElementById('reverse-drop-zone');
            const forwardFileName = document.getElementById('forward-file-name');
            const reverseFileName = document.getElementById('reverse-file-name');

            let geneCount = 0;
            let processedGenes = [];

            // ---------- 拖放上传功能实现 ----------
            function setupDragAndDrop(dropZone, fileInput, fileNameDisplay) {
                ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                    dropZone.addEventListener(eventName, preventDefaults, false);
                    document.body.addEventListener(eventName, preventDefaults, false);
                });

                function preventDefaults(e) {
                    e.preventDefault();
                    e.stopPropagation();
                }

                ['dragenter', 'dragover'].forEach(eventName => {
                    dropZone.addEventListener(eventName, () => dropZone.classList.add('drag-over'), false);
                });

                ['dragleave', 'drop'].forEach(eventName => {
                    dropZone.addEventListener(eventName, () => dropZone.classList.remove('drag-over'), false);
                });

                dropZone.addEventListener('drop', function(e) {
                    const dt = e.dataTransfer;
                    const files = dt.files;
                    if (files.length > 0) {
                        const file = files[0];
                        const dataTransfer = new DataTransfer();
                        dataTransfer.items.add(file);
                        fileInput.files = dataTransfer.files;
                        fileNameDisplay.textContent = file.name;
                        fileInput.dispatchEvent(new Event('change', { bubbles: true }));
                    }
                });

                dropZone.addEventListener('click', function(e) {
                    if (e.target === fileInput) return;
                    fileInput.click();
                });

                fileInput.addEventListener('change', function() {
                    if (fileInput.files.length > 0) {
                        fileNameDisplay.textContent = fileInput.files[0].name;
                    } else {
                        fileNameDisplay.textContent = '';
                    }
                });
            }

            setupDragAndDrop(forwardDropZone, forwardFileInput, forwardFileName);
            setupDragAndDrop(reverseDropZone, reverseFileInput, reverseFileName);

            // 添加基因按钮
            addGeneButton.addEventListener('click', function() {
                addGeneEntry();
            });

            // 处理所有基因
            processAllButton.addEventListener('click', function() {
                processAllGenes();
            });

            // 导出所有基因
            exportAllButton.addEventListener('click', function() {
                exportAllGenes();
            });

            // 注意：不再自动调用 addGeneEntry()，初始页面无基因条目

            // 批量导入FASTA文件
            importFastaBtn.addEventListener('click', async function() {
                const forwardFile = forwardFileInput.files[0];
                const reverseFile = reverseFileInput.files[0];

                if (!forwardFile || !reverseFile) {
                    alert('请同时选择或拖放正向链和反向链FASTA文件');
                    return;
                }

                try {
                    const forwardSeqs = await parseFastaFile(forwardFile);
                    const reverseSeqs = await parseFastaFile(reverseFile);

                    if (forwardSeqs.length === 0 || reverseSeqs.length === 0) {
                        alert('文件中未检测到有效序列');
                        return;
                    }

                    if (forwardSeqs.length !== reverseSeqs.length) {
                        alert(`正向序列数量(${forwardSeqs.length})与反向序列数量(${reverseSeqs.length})不一致，将按较少数量配对`);
                    }

                    const pairCount = Math.min(forwardSeqs.length, reverseSeqs.length);
                    for (let i = 0; i < pairCount; i++) {
                        const geneId = addGeneEntry();
                        const num = geneId.split('-')[1];
                        document.getElementById(`gene-name-${num}`).value = forwardSeqs[i].name || `基因_${i+1}`;
                        document.getElementById(`forward-sequence-${num}`).value = forwardSeqs[i].sequence;
                        document.getElementById(`reverse-sequence-${num}`).value = reverseSeqs[i].sequence;
                    }

                    alert(`成功导入并创建了 ${pairCount} 个基因对`);
                } catch (error) {
                    alert('文件读取失败: ' + error.message);
                }
            });

            // 清空文件选择
            clearImportBtn.addEventListener('click', function() {
                forwardFileInput.value = '';
                reverseFileInput.value = '';
                forwardFileName.textContent = '';
                reverseFileName.textContent = '';
                forwardFileInput.dispatchEvent(new Event('change'));
                reverseFileInput.dispatchEvent(new Event('change'));
            });

            // 解析FASTA文件
            async function parseFastaFile(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        try {
                            const content = e.target.result;
                            const sequences = [];
                            const lines = content.split(/\r?\n/);
                            let currentName = '';
                            let currentSeq = '';

                            for (let line of lines) {
                                line = line.trim();
                                if (line.startsWith('>')) {
                                    if (currentName && currentSeq) {
                                        sequences.push({
                                            name: currentName,
                                            sequence: currentSeq.toUpperCase()
                                        });
                                    }
                                    currentName = line.substring(1).trim();
                                    currentSeq = '';
                                } else if (line !== '') {
                                    currentSeq += line.replace(/\s/g, '');
                                }
                            }
                            if (currentName && currentSeq) {
                                sequences.push({
                                    name: currentName,
                                    sequence: currentSeq.toUpperCase()
                                });
                            }
                            resolve(sequences);
                        } catch (err) {
                            reject(err);
                        }
                    };
                    reader.onerror = reject;
                    reader.readAsText(file);
                });
            }

            // 添加基因输入区域
            function addGeneEntry() {
                geneCount++;
                const geneId = `gene-${geneCount}`;

                const geneEntry = document.createElement('div');
                geneEntry.className = 'gene-entry';
                geneEntry.id = geneId;

                geneEntry.innerHTML = `
                    <div class="gene-header">
                        <span class="gene-title">基因 ${geneCount}</span>
                        <button class="remove-gene" onclick="removeGene('${geneId}')">移除</button>
                    </div>
                    <div class="form-group">
                        <label for="gene-name-${geneCount}">基因名称:</label>
                        <input type="text" id="gene-name-${geneCount}" placeholder="输入基因名称">
                    </div>
                    <div class="form-group">
                        <label for="forward-sequence-${geneCount}">正向链序列:</label>
                        <textarea id="forward-sequence-${geneCount}" placeholder="输入正向链序列（如ATCGCCCAT）"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="reverse-sequence-${geneCount}">反向互补链序列:</label>
                        <textarea id="reverse-sequence-${geneCount}" placeholder="输入反向互补链序列（如TTCACGCCCAA）"></textarea>
                    </div>
                    <div class="button-group">
                        <button class="button primary-button" onclick="processGene('${geneId}')">处理此基因</button>
                    </div>
                    <div id="result-${geneId}" class="result-box" style="display: none;">
                    </div>
                `;

                genesContainer.appendChild(geneEntry);
                return geneId;
            }

            // 移除基因输入区域
            window.removeGene = function(geneId) {
                const geneElement = document.getElementById(geneId);
                if (geneElement) {
                    genesContainer.removeChild(geneElement);
                    processedGenes = processedGenes.filter(g => g.id !== geneId);
                }
            }

            // 处理单个基因
            window.processGene = function(geneId) {
                const idParts = geneId.split('-');
                const geneNum = idParts[1];

                const name = document.getElementById(`gene-name-${geneNum}`).value.trim();
                const forwardSeq = cleanSequence(document.getElementById(`forward-sequence-${geneNum}`).value);
                const reverseSeq = cleanSequence(document.getElementById(`reverse-sequence-${geneNum}`).value);

                if (!name) {
                    alert('请输入基因名称');
                    return;
                }

                if (!forwardSeq || !reverseSeq) {
                    alert('请输入正向链和反向互补链序列');
                    return;
                }

                const xChain = getReverseComplement(reverseSeq);
                const longestMatch = findLongestCommonSubstring(forwardSeq, xChain);

                if (longestMatch.length === 0) {
                    document.getElementById(`result-${geneId}`).innerHTML = `
                        <h3>处理结果: ${name}</h3>
                        <p>未找到正向链和反向互补链之间的相同段落</p>
                    `;
                    document.getElementById(`result-${geneId}`).style.display = 'block';
                    return;
                }

                const forwardBeforeY = forwardSeq.substring(0, longestMatch.startInForward);
                const xAfterY = xChain.substring(longestMatch.startInX + longestMatch.length);
                const completeSequence = forwardBeforeY + longestMatch.substring + xAfterY;

                const geneData = {
                    id: geneId,
                    name: name,
                    forwardSeq: forwardSeq,
                    reverseSeq: reverseSeq,
                    xChain: xChain,
                    longestMatch: longestMatch,
                    completeSequence: completeSequence
                };

                const index = processedGenes.findIndex(g => g.id === geneId);
                if (index !== -1) {
                    processedGenes[index] = geneData;
                } else {
                    processedGenes.push(geneData);
                }

                const resultDiv = document.getElementById(`result-${geneId}`);
                resultDiv.innerHTML = `
                    <h3>处理结果: ${name}</h3>
                    <p><strong>最长相同段落(Y):</strong> ${longestMatch.substring} (长度: ${longestMatch.length}bp)</p>
                    <p><strong>完整序列长度:</strong> ${completeSequence.length}bp</p>
                    <div class="sequence-display">
                        ${formatSequenceWithHighlight(forwardBeforeY, longestMatch.substring, xAfterY)}
                    </div>
                    <div class="button-group">
                        <button class="button success-button" onclick="exportSingleGene('${geneId}')">导出此基因(FASTA)</button>
                    </div>
                `;
                resultDiv.style.display = 'block';
            }

            function processAllGenes() {
                const geneEntries = document.querySelectorAll('.gene-entry');
                if (geneEntries.length === 0) {
                    alert('请至少添加一个基因');
                    return;
                }

                geneEntries.forEach(entry => {
                    const geneId = entry.id;
                    window.processGene(geneId);
                });

                processResult.innerHTML = `
                    <h3>批量处理完成</h3>
                    <p>已成功处理 ${processedGenes.length} 个基因</p>
                    <p>点击"导出所有基因"按钮下载FASTA文件</p>
                `;
                processResult.style.display = 'block';
            }

            window.exportSingleGene = function(geneId) {
                const geneData = processedGenes.find(g => g.id === geneId);
                if (!geneData) {
                    alert('请先处理此基因');
                    return;
                }

                const fastaContent = `>${geneData.name}\n${formatSequenceForFasta(geneData.completeSequence)}`;
                downloadFasta(fastaContent, `${geneData.name}.fasta`);
            }

            function exportAllGenes() {
                if (processedGenes.length === 0) {
                    alert('请先处理基因');
                    return;
                }

                let fastaContent = '';
                processedGenes.forEach(gene => {
                    fastaContent += `>${gene.name}\n${formatSequenceForFasta(gene.completeSequence)}\n`;
                });

                downloadFasta(fastaContent, '双向测序结果.fasta');
            }

            function cleanSequence(sequence) {
                return sequence.replace(/\s/g, '').toUpperCase();
            }

            function getReverseComplement(sequence) {
                const complementMap = {
                    'A': 'T',
                    'T': 'A',
                    'C': 'G',
                    'G': 'C'
                };
                return sequence.split('').reverse().map(base => complementMap[base] || base).join('');
            }

            function findLongestCommonSubstring(str1, str2) {
                let longest = '';
                let startInForward = 0;
                let startInX = 0;

                const table = Array(str1.length + 1).fill().map(() => Array(str2.length + 1).fill(0));

                for (let i = 1; i <= str1.length; i++) {
                    for (let j = 1; j <= str2.length; j++) {
                        if (str1[i - 1] === str2[j - 1]) {
                            table[i][j] = table[i - 1][j - 1] + 1;
                            if (table[i][j] > longest.length) {
                                longest = str1.substring(i - table[i][j], i);
                                startInForward = i - table[i][j];
                                startInX = j - table[i][j];
                            }
                        } else {
                            table[i][j] = 0;
                        }
                    }
                }

                return {
                    substring: longest,
                    length: longest.length,
                    startInForward: startInForward,
                    startInX: startInX
                };
            }

            function formatSequenceWithHighlight(beforeY, y, afterY) {
                const formatPart = (seq) => {
                    if (!seq) return '';
                    return seq.match(/.{1,80}/g).join('\n');
                };

                return `${formatPart(beforeY)}<span class="highlight">${formatPart(y)}</span>${formatPart(afterY)}`;
            }

            function formatSequenceForFasta(sequence) {
                return sequence.match(/.{1,80}/g).join('\n');
            }

            function downloadFasta(content, fileName) {
                const blob = new Blob([content], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                setTimeout(() => {
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                }, 0);
            }
        });
    </script>
</body>
</html>
